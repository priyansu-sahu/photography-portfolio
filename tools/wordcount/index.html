<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>word counter — priyansu.s</title>
  <meta name="description" content="Word, character, and line counter.">

  <link rel="icon" type="image/png" href="../../assets/favicon.png">
  <link rel="apple-touch-icon" href="../../assets/favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../../base.css">
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="wordcount.css">

  <script>
    (function(){
      var d=document.documentElement;
      try{
        var saved=localStorage.getItem('theme');
        if(saved) d.setAttribute('data-theme',saved);
        else if(matchMedia('(prefers-color-scheme:dark)').matches) d.setAttribute('data-theme','dark');
      }catch(e){
        if(matchMedia('(prefers-color-scheme:dark)').matches) d.setAttribute('data-theme','dark');
      }
    })();
  </script>
</head>
<body>

  <div class="site-wrapper">

    <header class="site-header">
      <a href="../../" class="logo-link" aria-label="Home">
        <svg class="logo-svg" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="1.2"/>
          <circle cx="24" cy="24" r="14" stroke="currentColor" stroke-width="1"/>
          <line x1="24" y1="2" x2="24" y2="10" stroke="currentColor" stroke-width="0.6"/>
          <line x1="24" y1="38" x2="24" y2="46" stroke="currentColor" stroke-width="0.6"/>
          <line x1="2" y1="24" x2="10" y2="24" stroke="currentColor" stroke-width="0.6"/>
          <line x1="38" y1="24" x2="46" y2="24" stroke="currentColor" stroke-width="0.6"/>
          <line x1="8.3" y1="8.3" x2="13" y2="13" stroke="currentColor" stroke-width="0.5"/>
          <line x1="35" y1="35" x2="39.7" y2="39.7" stroke="currentColor" stroke-width="0.5"/>
          <line x1="39.7" y1="8.3" x2="35" y2="13" stroke="currentColor" stroke-width="0.5"/>
          <line x1="13" y1="35" x2="8.3" y2="39.7" stroke="currentColor" stroke-width="0.5"/>
          <text x="24" y="28" text-anchor="middle" dominant-baseline="auto" font-family="'Crimson Pro', Georgia, serif" font-style="italic" font-size="15" font-weight="300" fill="currentColor" stroke="none">p</text>
        </svg>
        <span class="logo-wordmark">priyansu s.</span>
      </a>

      <nav class="header-nav" aria-label="Primary">
        <a href="../../tools" class="nav-link">&larr; tools</a>
        <button class="theme-toggle" data-theme-toggle aria-label="Switch to dark mode">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </button>
      </nav>
    </header>

    <main id="main">

      <div class="wc-header">
        <h1>word counter</h1>
        <p>Type or paste your text below.</p>
      </div>

      <div class="wc-stats" id="wc-stats">
        <div class="wc-stat">
          <span class="wc-stat-value" id="stat-words">0</span>
          <span class="wc-stat-label">words</span>
        </div>
        <div class="wc-stat-divider"></div>
        <div class="wc-stat">
          <span class="wc-stat-value" id="stat-chars">0</span>
          <span class="wc-stat-label">characters</span>
        </div>
        <div class="wc-stat-divider"></div>
        <div class="wc-stat">
          <span class="wc-stat-value" id="stat-chars-no-spaces">0</span>
          <span class="wc-stat-label">no spaces</span>
        </div>
        <div class="wc-stat-divider"></div>
        <div class="wc-stat">
          <span class="wc-stat-value" id="stat-lines">0</span>
          <span class="wc-stat-label">lines</span>
        </div>
        <div class="wc-stat-divider"></div>
        <div class="wc-stat">
          <span class="wc-stat-value" id="stat-sentences">0</span>
          <span class="wc-stat-label">sentences</span>
        </div>

      </div>

      <textarea
        id="wc-input"
        class="wc-textarea"
        placeholder="Start typing or paste your text here…"
        spellcheck="true"
        aria-label="Text input for word counting"
      ></textarea>

      <button class="wc-clear" id="wc-clear">clear</button>

    </main>

  </div>

  <script src="../../app.js" defer></script>
  <script src="wordcount.js" defer></script>
</body>
</html>
